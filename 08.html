                                                                                                                                                                         <!DOCTYPE html>
<html>
<head>
    
    <title>Event-Driven Programs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 50px;
            background-color: #f4f4f4;
        }
        .container {
            background: white;
            padding: 20px;
            max-width: 400px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        input {
            padding: 8px;
            width: 80%;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 10px;
            width: 100%;
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            border-radius: 5px;
        }
        button:hover {
            background-color: #218838;
        }
        .output {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Multiplication Table</h2>
        <input type="number" id="numInput" placeholder="Enter a number">
        <button onclick="printTable()">Generate Table</button>
        <div class="output" id="tableOutput"></div>
    </div>

    <br>

    <div class="container">
        <h2>Find Largest of Three Numbers</h2>
        <input type="number" id="num1" placeholder="Enter first number">
        <input type="number" id="num2" placeholder="Enter second number">
        <input type="number" id="num3" placeholder="Enter third number">
        <button onclick="findLargest()">Find Largest</button>
        <div class="output" id="largestOutput"></div>
    </div>

    <script>
        function printTable() {
            let num = document.getElementById("numInput").value;
            let output = "";
            if (num === "") {
                output = "Please enter a number.";
            } else {
                num = parseInt(num);
                for (let i = 1; i <= 10; i++) {
                    output += `${num} x ${i} = ${num * i} <br>`;
                }
            }
            document.getElementById("tableOutput").innerHTML = output;
        }

        function findLargest() {
            let num1 = parseFloat(document.getElementById("num1").value);
            let num2 = parseFloat(document.getElementById("num2").value);
            let num3 = parseFloat(document.getElementById("num3").value);
            let output = "";

            if (isNaN(num1) || isNaN(num2) || isNaN(num3)) {
                output = "Please enter all three numbers.";
            } else {
                let largest = Math.max(num1, num2, num3);
                output = `The largest number is: ${largest}`;
            }

            document.getElementById("largestOutput").innerHTML = output;
        }
    </script>

</body>
</html>
