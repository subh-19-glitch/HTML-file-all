                                                                                                                                                                            <!DOCTYPE html>
<html>
<head>
  <title>Student Registration Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #e6f2ff;
      padding: 20px;
    }

    h2 {
      text-align: center;
      color: #003366;
    }

    form {
      width: 60%;
      margin: auto;
      background-color: #ffffff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px #aaa;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .gender, .hobbies {
      width: auto;
    }

    .error {
      color: red;
      font-size: 14px;
    }

    button {
      margin-top: 15px;
      background-color: #0073e6;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #005bb5;
    }
  </style>
</head>
<body>

  <h2>Student Registration Form</h2>

  <form id="regForm" onsubmit="return validateForm()">
    <label>Full Name:</label>
    <input type="text" id="name">
    <span class="error" id="nameError"></span>

    <label>Roll Number (7-digit):</label>
    <input type="text" id="roll">
    <span class="error" id="rollError"></span>

    <label>Gender:</label>
    <input type="radio" name="gender" class="gender" value="Male"> Male
    <input type="radio" name="gender" class="gender" value="Female"> Female
    <span class="error" id="genderError"></span>

    <label>Course:</label>
    <select id="course">
      <option value="">--Select Course--</option>
      <option value="BCA">BCA</option>
      <option value="B.Tech">B.Tech</option>
      <option value="B.Sc">B.Sc</option>
      <option value="MBA">MBA</option>
    </select>
    <span class="error" id="courseError"></span>

    <label>Hobbies:</label>
    <input type="checkbox" class="hobbies" value="Reading"> Reading
    <input type="checkbox" class="hobbies" value="Music"> Music
    <input type="checkbox" class="hobbies" value="Sports"> Sports

    <label>Address:</label>
    <textarea id="address" rows="3"></textarea>

    <label>
      <input type="checkbox" id="terms"> I agree to the terms and conditions
    </label>
    <span class="error" id="termsError"></span>

    <button type="submit">Register</button>
  </form>

  <script>
    function validateForm() {
      let isValid = true;

      
      let name = document.getElementById("name").value;
      if (!/^[A-Za-z\s]+$/.test(name)) {
        document.getElementById("nameError").textContent = "Enter a valid name";
        isValid = false;
      } else {
        document.getElementById("nameError").textContent = "";
      }

     
      let roll = document.getElementById("roll").value;
      if (!/^\d{7}$/.test(roll)) {
        document.getElementById("rollError").textContent = "Roll number must be 7-digit";
        isValid = false;
      } else {
        document.getElementById("rollError").textContent = "";
      }

     
      let genderSelected = document.querySelector('input[name="gender"]:checked');
      if (!genderSelected) {
        document.getElementById("genderError").textContent = "Select your gender";
        isValid = false;
      } else {
        document.getElementById("genderError").textContent = "";
      }

    
      let course = document.getElementById("course").value;
      if (course === "") {
        document.getElementById("courseError").textContent = "Select your course";
        isValid = false;
      } else {
        document.getElementById("courseError").textContent = "";
      }

      
      if (!document.getElementById("terms").checked) {
        document.getElementById("termsError").textContent = "You must accept the terms";
        isValid = false;
      } else {
        document.getElementById("termsError").textContent = "";
      }

      return isValid;
    }
  </script>

</body>
</html>
